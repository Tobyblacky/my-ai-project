<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Watch - Adesewa Store</title>
  <link rel='stylesheet' href='css/styles.css'>
</head>
<body>
  <header>
    <div class='header-inner'>
      <a href='index.html' class='logo'>Adesewa Store</a>
      <nav class='nav-menu'>
        <a href='new-product-launch.html'>New Product Launch</a>
        <a href='mac.html'>Mac</a>
        <a href='iphone.html'>iPhone</a>
        <a href='ipad.html'>iPad</a>
        <a href='watch.html'>Watch</a>
        <a href='airpods.html'>Airpods</a>
        <a href='accessories.html'>Accessories</a>
        <a href='services.html'>Services</a>
        <a href='tecno.html'>Tecno</a>
        <a href='infinix.html'>Infinix</a>
        <a href='itel.html'>Itel</a>
        <a href='samsung.html'>Samsung</a>
        <a href='redmi.html'>Redmi</a>
      </nav>
    </div>
  </header>
  <main style='padding:20px;max-width:1200px;margin:0 auto;'>
    <h1>Watch</h1>
    <p>Browse Watch products from Adesewa Store.</p>
    <div id='productGrid' class='products'></div>
    <a href='index.html' style='display:inline-block;margin-top:16px;padding:10px 16px;background:#007BFF;color:#fff;border-radius:8px;text-decoration:none;'>Back to shop</a>
  </main>
  <script>
    const watchProducts=[
      {name:'Apple Watch Series 9',tagline:'Health and fitness on your wrist.',price:330000,image:'https://tse3.mm.bing.net/th/id/OIP.6Hw5zcBFNGGuGVApKvEQ8QHaHa?rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Apple Watch Ultra 2',tagline:'Precision for adventure.',price:1180000,image:'https://tse1.mm.bing.net/th/id/OIP.c2D1nRqtPjTzaxs_RZwo7gHaHa?w=1080&h=1080&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Apple Watch SE',tagline:'Everyday essentials at great value.',price:230000,image:'https://th.bing.com/th/id/OIP.gbQ4w4SoCJ9eGzmyMwRA_wHaHa?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Apple Watch Hermes',tagline:'Luxury design meets smartwatch.',price:1430000,image:'https://tse2.mm.bing.net/th/id/OIP.TsamWogvsaBmfAn8Mxrr_gAAAA?w=400&h=400&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Apple Watch Nike',tagline:'Sport performance and style.',price:650000,image:'https://tse3.mm.bing.net/th/id/OIP.KfDtV1j2Qlfiodr0lT4wlQHaFd?rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Apple Watch Series 10',tagline:'Customize your perfect pairing.',price:390000,image:'https://tse2.mm.bing.net/th/id/OIP.5M2wEsoKjqz_dRWVR5RDdQHaGm?rs=1&pid=ImgDetMain&o=7&rm=3'}
    ];
    function getCart(){ try { return JSON.parse(localStorage.getItem('adesewa_cart')||'[]'); } catch(e){ return []; }}
    function saveCart(c){ localStorage.setItem('adesewa_cart', JSON.stringify(c)); }
    function addToCart(name,price,image){ const cart=getCart(); const existing=cart.find(i=>i.name===name); if(existing){existing.qty=(existing.qty||1)+1;} else {cart.push({name,price,image,qty:1});} saveCart(cart); alert(name+' added to cart'); updateCartCount(); }
    function updateCartCount(){ const cart=getCart(); const count=cart.reduce((s,i)=>s+(i.qty||1),0); const e=document.getElementById('cartCount'); if(e) e.textContent=count; }
    function onShopNow(name,price,image){ addToCart(name,price,image); window.location.href='cart.html'; }
    function renderProducts(){
      const grid = document.getElementById('productGrid');
      grid.innerHTML = watchProducts.map(p => `
        <div class='card'>
          <img src='${p.image}' alt='${p.name}' onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300?text=No+Image'"/>
          <div class='card-body'>
            <h3>${p.name}</h3>
            <p>${p.tagline || ''}</p>
            <div class='price'>₦${p.price.toLocaleString()}</div>
            <button class='btn-shop' onclick="onShopNow('${p.name.replace(/'/g,"\\'" )}', ${p.price}, '${p.image}')">Shop now</button>
          </div>
        </div>
      `).join('');
    }
    renderProducts();
    updateCartCount();
  </script>
</body>
</html>
