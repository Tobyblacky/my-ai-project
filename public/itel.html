<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Itel - Adesewa Store</title>
  <link rel='stylesheet' href='css/styles.css'>
</head>
<body>
  <header>
    <div class='header-inner'>
      <a href='index.html' class='logo'>Adesewa Store</a>
      <nav class='nav-menu'>
        <a href='new-product-launch.html'>New Product Launch</a>
        <a href='mac.html'>Mac</a>
        <a href='iphone.html'>iPhone</a>
        <a href='ipad.html'>iPad</a>
        <a href='watch.html'>Watch</a>
        <a href='airpods.html'>Airpods</a>
        <a href='accessories.html'>Accessories</a>
        <a href='services.html'>Services</a>
        <a href='tecno.html'>Tecno</a>
        <a href='infinix.html'>Infinix</a>
        <a href='itel.html'>Itel</a>
      </nav>
      <div id="cartIcon"><a href="cart.html">🛒 <span id="cartCount">0</span></a></div>
    </div>
  </header>
  <main style='padding:20px;max-width:1200px;margin:0 auto;'>
    <h1>Itel</h1>
    <p>Browse Itel products from Adesewa Store.</p>
    <div id='productGrid' class='products'></div>
    <a href='index.html' style='display:inline-block;margin-top:16px;padding:10px 16px;background:#007BFF;color:#fff;border-radius:8px;text-decoration:none;'>Back to shop</a>
  </main>
  <script>
    const itelProducts = [
      {name:'Itel A70',tagline:'Entry-level smartphone with great design.',price:125000,image:'https://tse1.mm.bing.net/th/id/OIP.KlQ9fQ5K6M9pL5pZ5X8M5AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Itel S23',tagline:'Selfie-optimized with dual cameras.',price:185000,image:'https://tse2.mm.bing.net/th/id/OIP.rJ2qK3lM9pQ5rS7uW9xN0AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Itel P55 Plus',tagline:'Affordable 5G smartphone.',price:280000,image:'https://tse3.mm.bing.net/th/id/OIP.tL3rM4nO0qR6sT8vX0yP1AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Itel Vision 3',tagline:'Large display with ultrafast charging.',price:220000,image:'https://tse4.mm.bing.net/th/id/OIP.uM4sN5oP1rS7tU9wY1zQ2AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Itel A56 Pro',tagline:'Budget phone with solid specs.',price:155000,image:'https://tse1.mm.bing.net/th/id/OIP.vN5tO6pQ2sT8uV0xZ2aR3AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Itel S55',tagline:'Mid-range with impressive performance.',price:310000,image:'https://tse2.mm.bing.net/th/id/OIP.wO6uP7qR3tU9vW1yA3bS4AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'}
    ];

    function getCart(){
      try { return JSON.parse(localStorage.getItem('adesewa_cart') || '[]'); } catch(e){ return []; }
    }
    function saveCart(cart){
      localStorage.setItem('adesewa_cart', JSON.stringify(cart));
    }
    function addToCart(name, price, image){
      const cart = getCart();
      const existing = cart.find(item => item.name === name);
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
      } else {
        cart.push({name, price, image, qty:1});
      }
      saveCart(cart);
      alert(name + ' added to cart');
    }
    function onShopNow(name,price,image){ addToCart(name,price,image); window.location.href='cart.html'; }
    function renderProducts(){
      const grid = document.getElementById('productGrid');
      grid.innerHTML = itelProducts.map(p => `
        <div class='card'>
          <img src='${p.image}' alt='${p.name}' onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300?text=No+Image'"/>
          <div class='card-body'>
            <h3>${p.name}</h3>
            <p>${p.tagline || ''}</p>
            <div class='price'>₦${p.price.toLocaleString()}</div>
            <button class='btn-shop' onclick="onShopNow('${p.name.replace("'","\'" )}', ${p.price}, '${p.image}')">Shop now</button>
          </div>
        </div>
      `).join('');
    }
    renderProducts();
  </script>
</body>
</html>
