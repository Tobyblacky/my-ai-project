<html lang='en'>
<head>
  <meta charset='UTF-8'>

  <link rel='stylesheet' href='css/styles.css'>
</head>
<body>
  <header>
    <div class='header-inner'>
      <a href='index.html' class='logo'>Adesewa Store</a>
      <nav class='nav-menu'>
        <a href='new-product-launch.html'>New Product Launch</a>
        <a href='mac.html'>Mac</a>
        <a href='iphone.html'>iPhone</a>
        <a href='ipad.html'>iPad</a>

        <a href='accessories.html'>Accessories</a>

        <a href='samsung.html'>Samsung</a>
        <a href='redmi.html'>Redmi</a>
      </nav>
    </div>
  </header>
  <main style='padding:20px;max-width:1200px;margin:0 auto;'>
    <h1>Airpods</h1>
    <p>Browse Airpods products from Adesewa Store.</p>
    <div id='productGrid' class='products'></div>
    <a href='index.html' style='display:inline-block;margin-top:16px;padding:10px 16px;background:#007BFF;color:#fff;border-radius:8px;text-decoration:none;'>Back to shop</a>
  </main>
  <script>
    const airpodsProducts=[
      {name:'AirPods Pro 2',tagline:'Active noise cancellation and transparency.',price:450000,image:'https://platform.theverge.com/wp-content/uploads/sites/2/chorus/uploads/chorus_asset/file/24043027/DSCF9466.jpg?quality=90&strip=all&crop=0%2C0%2C100%2C100&w=2048'},
      {name:'AirPods 3',tagline:'Spatial audio and adaptive EQ.',price:260000,image:'https://tse4.mm.bing.net/th/id/OIP.5yoj0Obg_4iEwH_ragbAnQHaEK?w=1200&h=675&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'AirPods Max',tagline:'High-fidelity audio and immersive sound.',price:820000,image:'https://tse4.mm.bing.net/th/id/OIP.fdxLkDf3e8sJ05I6rBrGRQHaIM?rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'AirPods Pro 1',tagline:'Premium audio at value price.',price:370000,image:'https://www.apple.com/v/airpods-pro/an/images/overview/hero/hero_airpods_pro__d1j1wve0p relarge_2x.jpg'},
      {name:'AirPods (2nd gen)',tagline:'Great sound with built-in Siri.',price:150000,image:'https://www.apple.com/v/airpods/an/images/overview/hero/hero_airpods_2nd_gen__da5mdo0ngz2y_large_2x.jpg'},
      {name:'AirPods (1st gen)',tagline:'Classic wireless audio experience.',price:110000,image:'https://www.apple.com/v/airpods/an/images/overview/hero/hero_airpods_1st_gen__e5fonts578eg_large_2x.jpg'}
    ];

    function getCart(){ try { return JSON.parse(localStorage.getItem('adesewa_cart')||'[]'); } catch(e){ return []; }}
    function saveCart(c){ localStorage.setItem('adesewa_cart', JSON.stringify(c)); }
    function addToCart(name,price,image){ const cart=getCart(); const existing=cart.find(i=>i.name===name); if(existing){existing.qty=(existing.qty||1)+1;} else {cart.push({name,price,image,qty:1});} saveCart(cart); alert(name+' added to cart'); updateCartCount(); }
    function updateCartCount(){ const cart=getCart(); const count=cart.reduce((s,i)=>s+(i.qty||1),0); const e=document.getElementById('cartCount'); if(e) e.textContent=count; }
    function onShopNow(name,price,image){ addToCart(name,price,image); window.location.href='cart.html'; }

        function renderProducts(){
      const grid = document.getElementById('productGrid');
      grid.innerHTML = airpodsProducts.map(p => `
        <div class='card'>
          <img src='${p.image}' alt='${p.name}' onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300?text=No+Image'"/>
          <div class='card-body'>
            <h3>${p.name}</h3>
            <p>${p.tagline || ''}</p>
            <div class='price'>₦${p.price.toLocaleString()}</div>
            <button class='btn-shop' onclick="onShopNow('${p.name.replace("'","\'" )}', ${p.price}, '${p.image}')">Shop now</button>
          </div>
        </div>
      `).join('');
    }
    renderProducts();
    updateCartCount();
  </script>
</body>
</html>
