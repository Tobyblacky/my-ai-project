      {name:'Infinix Note 50 8/256',tagline:'Mid-range Note series.',price:343500,image:'https://tse1.mm.bing.net/th/id/OIP.wK8VpQ9e6c1lZXvJ7K0R7AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Note 50 Pro 8/256',tagline:'Professional features.',price:406800,image:'https://tse1.mm.bing.net/th/id/OIP.wK8VpQ9e6c1lZXvJ7K0R7AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Note 50 Pro+ 8/256',tagline:'Premium 5G upgrade.',price:721600,image:'https://tse1.mm.bing.net/th/id/OIP.wK8VpQ9e6c1lZXvJ7K0R7AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Note 60 Pro 8/256',tagline:'Professional Note flagship.',price:598600,image:'https://tse1.mm.bing.net/th/id/OIP.wK8VpQ9e6c1lZXvJ7K0R7AAAAA?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Hot 50 Pro+ 8/256',tagline:'Performance upgrade.',price:291100,image:'https://tse2.mm.bing.net/th/id/OIP.mF5k-rMfXhN0q8K0Lnw5nQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Hot 60 Pro 8/128',tagline:'Professional Hot series.',price:240400,image:'https://tse2.mm.bing.net/th/id/OIP.mF5k-rMfXhN0q8K0Lnw5nQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Hot 60 Pro+ 8/128',tagline:'Top-tier Hot series.',price:291500,image:'https://tse2.mm.bing.net/th/id/OIP.mF5k-rMfXhN0q8K0Lnw5nQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix Hot 60 Pro+ 8/256',tagline:'Premium Hot storage variant.',price:321700,image:'https://tse2.mm.bing.net/th/id/OIP.mF5k-rMfXhN0q8K0Lnw5nQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix GT 20 Pro 12/256',tagline:'Gaming powerhouse.',price:590900,image:'https://tse4.mm.bing.net/th/id/OIP.Sw8nQ3fRq7nP8mL9H9wZMQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix XPAD 4/128 4G',tagline:'Tablet 4G connectivity.',price:234000,image:'https://tse4.mm.bing.net/th/id/OIP.Sw8nQ3fRq7nP8mL9H9wZMQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix XPAD 4/256 WIFI',tagline:'Tablet WIFI variant.',price:242900,image:'https://tse4.mm.bing.net/th/id/OIP.Sw8nQ3fRq7nP8mL9H9wZMQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix XPAD 20 4/128 4G New',tagline:'Latest XPAD 4G model.',price:230500,image:'https://tse4.mm.bing.net/th/id/OIP.Sw8nQ3fRq7nP8mL9H9wZMQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'},
      {name:'Infinix XPAD 20 8/256 4G New',tagline:'Latest XPAD premium model.',price:269000,image:'https://tse4.mm.bing.net/th/id/OIP.Sw8nQ3fRq7nP8mL9H9wZMQHaHa?w=474&h=474&rs=1&pid=ImgDetMain&o=7&rm=3'}
    ];

    function getCart(){
      try { return JSON.parse(localStorage.getItem('adesewa_cart') || '[]'); } catch(e){ return []; }
    }
    function saveCart(cart){
      localStorage.setItem('adesewa_cart', JSON.stringify(cart));
    }
    function addToCart(name, price, image){
      const cart = getCart();
      const existing = cart.find(item => item.name === name);
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
      } else {
        cart.push({name, price, image, qty:1});
      }
      saveCart(cart);
      alert(name + ' added to cart');
    }
    function onShopNow(name,price,image){ addToCart(name,price,image); window.location.href='cart.html'; }
    function renderProducts(){
      const grid = document.getElementById('productGrid');
      grid.innerHTML = infinixProducts.map(p => `
        <div class='card'>
          <img src='${p.image}' alt='${p.name}' onerror="this.onerror=null;this.src='https://via.placeholder.com/400x300?text=No+Image'"/>
          <div class='card-body'>
            <h3>${p.name}</h3>
            <p>${p.tagline || ''}</p>
            <div class='price'>₦${p.price.toLocaleString()}</div>
            <button class='btn-shop' onclick="onShopNow('${p.name.replace("'","\'" )}', ${p.price}, '${p.image}')">Shop now</button>
          </div>
        </div>
      `).join('');
    }
    renderProducts();
  </script>
</body>
</html>
